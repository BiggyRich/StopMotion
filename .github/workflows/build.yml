name: Build Cross-Platform App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: StopMotionBuilder-Windows
            build_script: packaging/build_win.bat
          - os: macos-latest
            artifact_name: StopMotionBuilder-MacOS
            build_script: ./packaging/build_mac.sh

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install FFmpeg (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install ffmpeg
        echo "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" >> $GITHUB_PATH

    - name: Install FFmpeg (MacOS)
      if: matrix.os == 'macos-latest'
      run: brew install ffmpeg

    - name: Run Build Script
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          # We manually run pyinstaller here to avoid 'pause' in the .bat file
          pyinstaller StopMotion.spec --clean --noconfirm
        else
          chmod +x packaging/build_mac.sh
          ./packaging/build_mac.sh
        fi

    - name: List files in dist (Debug)
      shell: bash
      run: ls -R dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/StopMotionBuilder.exe
          dist/StopMotionBuilder.app
        if-no-files-found: warn
